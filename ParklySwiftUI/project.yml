name: ParklySwiftUI
options:
  bundleIdPrefix: com.parkly
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "14.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
targets:
  ParklySwiftUI:
    type: application
    platform: iOS
    sources:
      - path: ParklySwiftUI
        excludes:
          - "*.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parkly.app
        INFOPLIST_FILE: ParklySwiftUI/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
    preBuildScripts: []
    postCompileScripts: []
